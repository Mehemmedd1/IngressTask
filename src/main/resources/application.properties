# Meta Graph API Configuration
# Values are loaded from the .env file at the project root via spring-dotenv.
# NEVER commit real credentials to version control.
meta.api.base-url=${META_API_BASE_URL:https://graph.facebook.com}
meta.api.version=${META_API_VERSION:v21.0}
meta.api.access-token=${META_ACCESS_TOKEN}
meta.api.page-id=${META_PAGE_ID:me}

# Server Configuration
server.port=8080
